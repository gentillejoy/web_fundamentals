<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Invitation</title>

    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="invitation">

        
        <div class="left">
            <h1 class="title">🎉 Birthday Celebration</h1>

            <p class="description">
                You are warmly invited to celebrate a special day filled with joy,
                laughter and unforgettable memories. Join us as we gather together
                to make this event truly meaningful.
            </p>

            <div class="cta">
                <button>RSVP Now</button>
            </div>
        </div>

       
        <div class="right">
            <div class="detail">
                <span>📅 Date:</span>
                <p>March 10, 2026</p>
            </div>

            <div class="detail">
                <span>⏰ Time:</span>
                <p>4:00 PM</p>
            </div>

            <div class="detail">
                <span>📍 Location:</span>
                <p>Kigali Convention Center</p>
            </div>
        </div>

    </div>

</body>
</html>
