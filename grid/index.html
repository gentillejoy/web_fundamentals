<style>
.container {
  background-color: #9f9f9f;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(5, auto);
  grid-template-rows: repeat(5, auto);
  gap: 10px;
}

.container > div {
  background-color: dodgerblue;
  /* color: white; */
  padding: 20px;
  text-align: center;
  color: white;
  font-size: 40px;
}
</style>
